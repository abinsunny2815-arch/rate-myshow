{% extends "layouts/base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <h1 class="text-9xl font-bold text-red-600 mb-4">404</h1>
        <h2 class="text-4xl font-bold mb-4">Page Not Found</h2>
        <p class="text-gray-400 mb-8 text-lg">Sorry, the page you're looking for doesn't exist.</p>
        <a href="{% url 'core:home' %}" class="px-6 py-3 bg-red-600 rounded-lg hover:bg-red-700 transition font-bold">
            <i class="fas fa-home mr-2"></i> Back to Home
        </a>
    </div>
</div>
{% endblock %}
