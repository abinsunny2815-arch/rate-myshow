{% extends "layouts/base.html" %}

{% block title %}Genres - RateMyShow{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-4xl font-bold mb-8">Browse by Genre</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for genre in genres %}
        <a href="{{ genre.get_absolute_url }}"
            class="group bg-gradient-to-br from-red-600 to-red-800 p-8 rounded-lg hover:shadow-lg transition transform hover:-translate-y-1">
            <h2 class="text-3xl font-bold mb-4">{{ genre.name }}</h2>
            <p class="text-red-100">
                <i class="fas fa-arrow-right mr-2"></i>
                Browse {{ genre.titles.count }} titles
            </p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
